DWAPlannerROS:
  # 速度限制
  max_vel_x:        0.3
  min_vel_x:       -0.3
  max_vel_y:        0.3    # 麥輪全向，允許側移
  min_vel_y:       -0.3
  max_vel_trans:    0.3
  min_vel_trans:    0.0
  max_vel_theta:    0.8
  min_vel_theta:    0.1

  # 加速度限制
  acc_lim_x:        1.0
  acc_lim_y:        1.0
  acc_lim_theta:    1.5

  # 目標容忍度
  xy_goal_tolerance:  0.20
  yaw_goal_tolerance: 3.14   # 麥輪全向，不管朝向
  latch_xy_goal_tolerance: true

  # 軌跡模擬
  sim_time:         1.5
  sim_granularity:  0.05
  vx_samples:       10
  vy_samples:       10
  vth_samples:      20

  # 評分權重
  path_distance_bias:    32.0
  goal_distance_bias:    24.0
  occdist_scale:          0.1   # 降低障礙物懲罰，避免繞圈
  forward_point_distance: 0.325
  stop_time_buffer:       0.2
  scaling_speed:          0.25
  max_scaling_factor:     0.2

  # 振盪
  oscillation_reset_dist: 0.05
